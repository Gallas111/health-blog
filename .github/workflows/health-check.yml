name: Health Check Bot

on:
  schedule:
    - cron: '30 15 * * *'
  workflow_dispatch:

concurrency:
  group: content-pipeline
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Notify Telegram (Start)
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🏥 [Health Blog] Health check 시작..." || true

      - name: Run Health Check
        id: healthcheck
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: npx tsx scripts/health-check.ts 2>&1 | tee /tmp/healthcheck.log
        continue-on-error: true

      - name: Commit fixes if any
        id: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotePath false
          git add .
          git diff --staged --quiet && echo "No fixes needed" && exit 0
          git commit -m "fix(health-check): auto-fix broken images, links, and MDX syntax"

          if ! git pull --rebase origin main; then
            echo "Rebase conflict, resolving..."
            git diff --name-only --diff-filter=U -z | while IFS= read -r -d '' file; do
              git checkout --theirs "$file"
              git add "$file"
            done
            GIT_EDITOR=true git rebase --continue
          fi

          git push origin main

      - name: Notify Telegram (Result)
        if: always()
        run: |
          LOG="/tmp/healthcheck.log"
          POSTS=$(grep -oP 'Total posts scanned:\s+\K\d+' "$LOG" 2>/dev/null || echo "?")
          ISSUES=$(grep -oP 'Total issues found:\s+\K\d+' "$LOG" 2>/dev/null || echo "?")
          FIXES=$(grep -oP 'Fixes applied:\s+\K\d+' "$LOG" 2>/dev/null || echo "0")
          REMAINING=$(grep -oP 'Remaining issues:\s+\K\d+' "$LOG" 2>/dev/null || echo "0")

          # Build detail lines from remaining issue entries (lines starting with "    - [")
          DETAILS=""
          if [ "$REMAINING" != "0" ]; then
            DETAILS=$(grep -P '^\s+- \[' "$LOG" 2>/dev/null | sed 's/^\s*//' | head -10)
          fi

          # Build fix detail from "Fixed" lines
          FIX_DETAILS=""
          if [ "$FIXES" != "0" ]; then
            FIX_DETAILS=$(grep -P '^✅ Fixed' "$LOG" 2>/dev/null | head -10)
          fi

          if [ "${{ steps.healthcheck.outcome }}" = "success" ]; then
            if [ "$FIXES" -gt 0 ] 2>/dev/null; then
              MSG="✅ [Health Blog] Health check 완료
          📊 스캔: ${POSTS}개 포스트
          🔧 수정: ${FIXES}건 자동 수정됨"
              [ -n "$FIX_DETAILS" ] && MSG="${MSG}
          ${FIX_DETAILS}"
              [ "$REMAINING" != "0" ] && MSG="${MSG}
          ⚠️ 미해결: ${REMAINING}건
          ${DETAILS}"
            else
              MSG="✅ [Health Blog] Health check 완료 — 이상 없음
          📊 스캔: ${POSTS}개 포스트"
            fi
          else
            MSG="❌ [Health Blog] Health check 실패
          📊 스캔: ${POSTS}개 포스트 / 발견: ${ISSUES}건 / 수정: ${FIXES}건"
            [ -n "$FIX_DETAILS" ] && MSG="${MSG}
          ${FIX_DETAILS}"
            [ "$REMAINING" != "0" ] && MSG="${MSG}
          ⚠️ 미해결: ${REMAINING}건
          ${DETAILS}"
          fi

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            --data-urlencode "text=${MSG}" || true
