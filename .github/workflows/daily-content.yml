name: Daily Health Article Generation

on:
  schedule:
    # KST 08:30 (UTC 23:30) - Morning Commute
    - cron: '30 23 * * *'
    # KST 11:30 (UTC 02:30) - Pre-Lunch
    - cron: '30 2 * * *'
    # KST 14:30 (UTC 05:30) - Mid-Afternoon
    - cron: '30 5 * * *'
    # KST 17:30 (UTC 08:30) - Pre-Evening
    - cron: '30 8 * * *'
    # KST 21:30 (UTC 12:30) - Night
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure keywords.json exists
        run: |
          if [ ! -f scripts/keywords.json ]; then
            echo "[]" > scripts/keywords.json
          fi

      - name: Notify Telegram (Start)
        continue-on-error: true
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"🚀 [오늘도 건강] 새 건강 글 작성을 시작합니다...\"}"
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Trend Hunting (Bot)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}
        run: npx tsx scripts/trend-hunter.ts

      - name: Generate Health Article
        id: generate
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCHAPI_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run blog:generate

      - name: Content Refinement (Bot)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: npx tsx scripts/content-refiner.ts

      - name: Validate and Fix Images (Bot)
        env:
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npx tsx scripts/image-bot.ts

      - name: Internal Linking (Bot)
        run: npx tsx scripts/internal-linker.ts

      - name: Fix MDX Syntax (Static Export Guard)
        run: |
          echo "🔧 Running MDX Syntax Fixer for Cloudflare Pages compatibility..."
          npx tsx scripts/fix-mdx-syntax.ts

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotePath false
          git add .
          git commit -m "Auto: Generated new health article" || echo "No changes to commit"

          if ! git pull --rebase origin main; then
            echo "Rebase conflict detected, auto-resolving..."
            git diff --name-only --diff-filter=U -z | while IFS= read -r -d '' file; do
              echo "  Resolving: $file"
              if [ "$file" = "scripts/keywords.json" ]; then
                git show :2:scripts/keywords.json > /tmp/kw_upstream.json 2>/dev/null || echo "[]" > /tmp/kw_upstream.json
                git show :3:scripts/keywords.json > /tmp/kw_ours.json 2>/dev/null || echo "[]" > /tmp/kw_ours.json
                node -e "
                  const fs = require('fs');
                  const a = JSON.parse(fs.readFileSync('/tmp/kw_upstream.json','utf8'));
                  const b = JSON.parse(fs.readFileSync('/tmp/kw_ours.json','utf8'));
                  const merged = [...new Set([...a, ...b])];
                  fs.writeFileSync('scripts/keywords.json', JSON.stringify(merged, null, 2) + '\n');
                "
              else
                git checkout --ours "$file" 2>/dev/null || git checkout --theirs "$file"
              fi
              git add "$file"
            done
            GIT_EDITOR=true git rebase --continue
          fi

          git push origin main

      - name: Ping Google Sitemap
        run: curl -s "https://www.google.com/ping?sitemap=https://www.wellnesstodays.com/sitemap.xml"

      - name: Notify Telegram (Success)
        if: success()
        continue-on-error: true
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            POST_URL="${{ steps.generate.outputs.POST_URL }}"
            if [ -n "$POST_URL" ]; then
              MSG="✅ [오늘도 건강] 새 글이 발행되었습니다! 📄 ${POST_URL}"
            else
              MSG="✅ [오늘도 건강] 작업 완료!"
            fi
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${MSG}\"}"
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify Telegram (Failure)
        if: failure()
        continue-on-error: true
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ [오늘도 건강] 자동화 실패! GitHub Actions 로그를 확인하세요.\"}"
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
